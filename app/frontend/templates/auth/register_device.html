<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Device Authorization | Sport Time Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandRed: '#D92D2D' } } } }
    </script>
    <style>
        body { background-color: #0f1115; font-family: 'Inter', sans-serif; color: white;}
        .bg-card { background-color: #191c24; border: 1px solid #2d313c; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Red glow background accent -->
    <div class="absolute w-[500px] h-[500px] bg-brandRed rounded-full blur-[150px] opacity-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

    <div class="bg-card p-10 rounded-2xl shadow-2xl w-full max-w-md relative z-10">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic uppercase tracking-wider mb-2"><span class="text-brandRed">SPORT TIME</span> GYM</h1>
            <p class="text-sm text-gray-400 font-medium tracking-widest uppercase">Device Authorization Required</p>
        </div>

        <div class="bg-yellow-950/20 border border-yellow-800/50 text-yellow-500 text-xs p-4 rounded-lg mb-6 leading-relaxed flex items-start space-x-2">
            <i class="fa-solid fa-circle-exclamation mt-0.5 flex-shrink-0"></i>
            <span>This computer has not been authorized to run the Sport Time Gym ERP application yet. Please contact your system administrator to register this device.</span>
        </div>

        <!-- Machine GUID Identification Display -->
        <div class="mb-6">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Device Fingerprint ID</label>
            <div class="bg-[#1c1e24] text-gray-300 font-mono text-xs rounded-md p-3 border border-gray-700 select-all break-all text-center relative group">
                {{ device_guid }}
                <button onclick="copyFingerprint()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition" title="Copy to clipboard">
                    <i id="copy-icon" class="fa-regular fa-copy"></i>
                </button>
            </div>
        </div>

        <!-- Registration Form -->
        <form id="register-form" onsubmit="executeRegistration(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Authorization Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3"><i class="fa-solid fa-key text-gray-500"></i></span>
                    <input type="password" id="password" name="password" required placeholder="Enter system authorization key"
                           class="w-full bg-[#1c1e24] text-white border border-gray-600 rounded-md py-3 pl-10 pr-4 focus:border-brandRed focus:ring-1 focus:ring-brandRed focus:outline-none transition">
                </div>
            </div>

            <div id="error-box" class="hidden bg-red-900/30 border border-red-800 text-red-400 text-sm p-3 rounded text-center"></div>
            <div id="success-box" class="hidden bg-green-900/30 border border-green-800 text-green-400 text-sm p-3 rounded text-center"></div>

            <button type="submit" id="btn-register" class="w-full bg-brandRed hover:bg-[#b52525] text-white py-3 rounded-md font-bold transition flex items-center justify-center space-x-2">
                <span>Authorize & Register Device</span> <i class="fa-solid fa-arrow-right ml-1 text-sm"></i>
            </button>
        </form>

        <p class="text-center text-xs text-gray-600 mt-8">Secure Hardware Identification Lock.</p>
    </div>

    <script>
        function copyFingerprint() {
            const fingerprint = "{{ device_guid }}";
            navigator.clipboard.writeText(fingerprint).then(() => {
                const icon = document.getElementById("copy-icon");
                icon.className = "fa-solid fa-check text-green-500";
                setTimeout(() => {
                    icon.className = "fa-regular fa-copy";
                }, 2000);
            });
        }

        async function executeRegistration(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');
            const btn = document.getElementById('btn-register');

            errorBox.classList.add("hidden");
            successBox.classList.add("hidden");
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Authorizing...`;
            btn.disabled = true;

            try {
                const response = await fetch('/api/v1/register-device', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    errorBox.innerText = data.detail || "Authorization Failed. Please verify the password.";
                    errorBox.classList.remove("hidden");
                    btn.innerHTML = `<span>Authorize & Register Device</span> <i class="fa-solid fa-arrow-right"></i>`;
                    btn.disabled = false;
                } else {
                    successBox.innerText = data.message || "Device authorized successfully! Redirecting...";
                    successBox.classList.remove("hidden");
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 2000);
                }
            } catch(err) {
                errorBox.innerText = "Connection lost. Please check if the server is running.";
                errorBox.classList.remove("hidden");
                btn.innerHTML = `<span>Authorize & Register Device</span> <i class="fa-solid fa-arrow-right"></i>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
